{% extends 'noticeboard/base.html' %}

{% block content %}

<div class="card shadow-sm p-4">

    <span class="badge bg-primary">
        {{ notice.category.name }}
    </span>

    <h2 class="mt-3">{{ notice.title }}</h2>

    <p class="text-muted">
        Posted on {{ notice.created_at|date:"F d, Y" }}
    </p>

    {% if notice.image %}
        <img src="{{ notice.image.url }}"
             class="img-fluid rounded mb-3">
    {% endif %}

    <p>{{ notice.content }}</p>

    {% if notice.attachment %}
        <a href="{{ notice.attachment.url }}"
           class="btn btn-outline-secondary mt-3">
           Download Attachment
        </a>
    {% endif %}

</div>

{% endblock %}
