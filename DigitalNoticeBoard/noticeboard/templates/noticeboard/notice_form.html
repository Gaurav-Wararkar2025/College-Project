{% extends 'noticeboard/base.html' %}
{% block content %}

<style>
    /* 1. The Container Card - Glassmorphism Effect */
    .form-card-glow {
        background: rgba(22, 27, 34, 0.8) !important;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 20px !important;
        padding: 40px !important;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important;
        max-width: 750px;
        margin: 40px auto;
        color: #f0f6fc !important;
    }

    /* 2. Heading - Tech Style */
    .form-card-glow h3 {
        color: #00a2ff; /* Neon Blue */
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 30px;
        text-align: center;
        text-shadow: 0 0 15px rgba(0, 162, 255, 0.4);
    }

    /* 3. Label Styling */
    .form-card-glow label {
        font-weight: 600;
        color: #8b949e;
        margin-bottom: 10px;
        display: block;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
    }

    /* 4. High-Visibility Inputs */
    .form-card-glow input, 
    .form-card-glow textarea, 
    .form-card-glow select {
        background-color: #0d1117 !important; /* Deep Dark for Contrast */
        border: 1px solid #30363d !important;
        border-radius: 12px !important;
        color: #ffffff !important; /* Bright White Text */
        padding: 14px 18px !important;
        width: 100%;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-bottom: 5px;
    }

    /* 5. Neon Focus Animation */
    .form-card-glow input:focus, 
    .form-card-glow textarea:focus, 
    .form-card-glow select:focus {
        outline: none !important;
        border-color: #00ff88 !important; /* Neon Green focus */
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.15) !important;
        background-color: #161b22 !important;
        transform: scale(1.01);
    }

    /* 6. Submit Button - The "Create Notice" Glow */
    .btn-glow-submit {
        background: linear-gradient(45deg, #00ff88, #00d4ff) !important;
        color: #000000 !important;
        font-weight: 800 !important;
        border: none !important;
        padding: 16px !important;
        border-radius: 14px !important;
        text-transform: uppercase;
        letter-spacing: 2px;
        width: 100%;
        margin-top: 20px;
        transition: 0.4s ease;
        box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2) !important;
    }

    .btn-glow-submit:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4) !important;
        filter: brightness(1.1);
    }

    /* 7. Error Handling */
    .text-danger {
        font-size: 0.8rem;
        font-weight: 600;
        color: #ff4d4d !important;
        margin-top: 5px;
    }

    /* Custom Style for File Input button */
    input[type="file"]::file-selector-button {
        background: #21262d;
        color: white;
        border: 1px solid #30363d;
        padding: 5px 15px;
        border-radius: 8px;
        margin-right: 15px;
        cursor: pointer;
    }
</style>

<div class="form-card-glow">
    <h3>✨ Create Notice</h3>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.non_field_errors }}

        {% for field in form %}
            <div class="mb-4">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                <div class="text-danger">
                    {{ field.errors }}
                </div>
            </div>
        {% endfor %}

        <button type="submit" class="btn-glow-submit">
            🚀 Publish Announcement
        </button>
    </form>
</div>

{% endblock %}
